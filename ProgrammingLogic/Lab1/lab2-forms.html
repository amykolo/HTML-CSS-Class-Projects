<p>
<label for="name">Customer Name:</label><br>
<input type="text" id="name" name="customer_name">
</p>

<p>
<label for="email">Email Address:</label><br>
<input type="email" id="email" name="email">
</p>

<p>
<label for="coffee">Coffee Type:</label><br>

<select id="coffee" name="coffee">
    <option>Latte</option>
    <option>Cappuccino</option>
    <option>Mocha</option>
    <option>Espresso</option>
    <option>Americano</option>
</select>

</p>

<p>

Size:<br>

<input type="radio" id="small" name="size" value="Small">
<label for="small">Small</label><br>

<input type="radio" id="medium" name="size" value="Medium">
<label for="medium">Medium</label><br>

<input type="radio" id="large" name="size" value="Large">
<label for="large">Large</label>

</p>

<p>

Extras:<br>

<input type="checkbox" id="cream" name="extras" value="Whipped Cream">
<label for="cream">Whipped Cream</label><br>

<input type="checkbox" id="shot" name="extras" value="Extra Shot">
<label for="shot">Extra Shot</label><br>

<input type="checkbox" id="almond" name="extras" value="Almond Milk">
<label for="almond">Almond Milk</label>

</p>

<p>

<label for="instructions">Special Instructions:</label><br>

<textarea id="instructions" name="instructions" rows="5" cols="30"></textarea>

</p>

<p>

<button type="submit">Submit Order</button>

</p>
